<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&q=80&w=32&h=32">
    <title>Login | TruthSeekers Portal</title>
    <!-- We load global first, then login to override and enforce viewport rule -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

    <!-- Rules 17, 18, 19, 21, 22 in effect -->
    <!-- No Navbar, No Footer, Single Viewport -->
    <div class="login-card">
        <div class="login-header">
            <!-- Clickable logo redirecting to home -->
            <a href="index.html" class="brand-logo">
                <img src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&q=80&w=64&h=64" alt="Logo" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 8px;">
                <span>TruthSeekers</span>
            </a>
            <p class="sub-text" style="margin-top: 0.5rem; margin-bottom: 0;">Secure Client Portal</p>
        </div>

        <!-- Social logins standardized -->
        <div class="social-login-grid">
            <button class="social-btn google">
                <i class="fa-brands fa-google"></i> Google
            </button>
            <button class="social-btn linkedin">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg" alt="LinkedIn" style="width:20px; filter: brightness(0) invert(1);"> LinkedIn
            </button>
        </div>

        <div class="login-divider">OR</div>

        <form action="dashboard.html" method="GET">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-sub);">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="color: var(--secondary-color);">Forgot Password?</a>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </form>
    </div>

</body>
</html>
